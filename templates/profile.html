{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}
<h2>User Profile</h2>
<p>Username: {{ user.username }}</p>
<p>Email: {{ user.email }}</p>
<p>First Name: {{ user.first_name }}</p>
<p>Last Name: {{ user.last_name }}</p>
<img src="{{ user.profile_image.url }}" alt="Profile Image">
{% endblock %}
